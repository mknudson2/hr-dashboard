# =============================================================================
# HR Dashboard - Nginx Configuration
# =============================================================================
# This configuration serves both HR Hub and Employee Portal
# with HTTPS and reverse proxy to the FastAPI backend
#
# Installation path: /etc/nginx/sites-available/hr-dashboard
# Enable with: sudo ln -s /etc/nginx/sites-available/hr-dashboard /etc/nginx/sites-enabled/

# -----------------------------------------------------------------------------
# HR Hub (Main HR Dashboard)
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name hr.bifrostin.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hr.bifrostin.com;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/hr.bifrostin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hr.bifrostin.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Root directory for HR Hub static files
    root /var/www/hr-dashboard/frontend;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to FastAPI backend
    location /auth {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # All other API endpoints
    location ~ ^/(fmla|employees|analytics|notifications|garnishments|turnover|events|event-types|projects|timesheets|time-entries|compensation|market-data|performance|onboarding|offboarding|equipment|contribution-limits|pto|users|admin|aca|eeo|settings|emails|file-uploads|sftp|payroll|capitalized-labor|reports)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }
}

